  <!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sistema</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Sistema</h2>
            <a href="#"> Dashboard </a>
            <a href="#"> Cadastro </a>
            <a href="#"> Relatórios </a>
        </aside>

        <main class="content">
            <header class="topbar">
                <h1> Cadastro do Usuários </h1>
            </header>

            <section class="card">

                <form onsubmit="cadastrar(event)">
                    <input type="text" id="nome" placeholder="Digite seu Nome" />
                    <input type="email" id="email" placeholder="Digite seu E-Mail" />

                    <button type="submit"> Cadastrar </button>
                </form>
            </section>

            <section class="card">
                <h2> Usuários Cadastrados </h2>
                <ul id="lista">
                </ul>
            </section>
        </main>
    </div>


    <!--------------------------------->
    <script src="JS/script.js"></script>
</body>

</html>
